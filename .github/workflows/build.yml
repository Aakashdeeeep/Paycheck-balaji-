name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Mac DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: ./node_modules/.bin/electron-rebuild -f -w better-sqlite3

      - name: Build Mac DMG
        run: npm run build:mac

      - name: Upload Mac DMGs
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (needed for native module build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (skip postinstall)
        run: npm ci --ignore-scripts

      - name: Rebuild native modules for Electron
        run: ./node_modules/.bin/electron-rebuild -f -w better-sqlite3

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          name: Payroll Manager ${{ github.ref_name }}
          body: |
            ## Payroll Manager ${{ github.ref_name }}

            ### How to install

            **Windows:**
            1. Download `Payroll Manager Setup 1.0.0.exe`
            2. Double-click → click Install
            3. Open from Start Menu or Desktop

            **Mac (M1/M2/M3):**
            1. Download `Payroll Manager-1.0.0-arm64.dmg`
            2. Open it → drag app to Applications
            3. Right-click the app → Open (first time only)

            **Mac (Intel):**
            1. Download `Payroll Manager-1.0.0.dmg`
            2. Same steps as above
