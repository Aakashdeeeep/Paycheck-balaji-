name: Build Installers

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  build-mac:
    name: Mac DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Mac DMG
        run: npm run build:mac

      - name: Upload Mac arm64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          name: Payroll Manager ${{ github.ref_name }}
          body: |
            ## Payroll Manager ${{ github.ref_name }}

            ### Downloads
            - **Mac (M1/M2/M3)** → download the `-arm64.dmg` file
            - **Mac (Intel)** → download the `.dmg` file (no arm64 in name)
            - **Windows** → download the `.exe` file, run as installer
