name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Mac DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Mac DMG
        run: npx electron-builder --mac --config.npmRebuild=true
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: Upload Mac DMGs
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer
        run: npx electron-builder --win --config.npmRebuild=true

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
          name: Payroll Manager ${{ github.ref_name }}
          body: |
            ## Payroll Manager ${{ github.ref_name }}

            ### How to install

            **Windows:**
            1. Download `Payroll Manager Setup 1.0.0.exe`
            2. Double-click → click Install → Done
            3. Open from Start Menu or Desktop shortcut

            **Mac (M1/M2/M3):**
            1. Download `Payroll Manager-1.0.0-arm64.dmg`
            2. Open → drag app to Applications folder
            3. First time: right-click the app → Open

            **Mac (Intel):**
            1. Download `Payroll Manager-1.0.0.dmg`
            2. Same steps as above
